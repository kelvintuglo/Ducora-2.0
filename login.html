<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a web app that is created to help teachers track their students performance">

    <link rel="stylesheet" href="/css/login.css">

    <title> Log In-Ducora</title>
  </head>

  <body>
    <main>
      <div class="form-wrapper">
        <header id="main-header">
          <h1>Log in to Ducora</h1>
        </header>

        <form id="login-form" method="POST" action="/ducora-login">
          <div class="google">
            <!-- TODO: Trigger Google OAuth flow here using Firebase Auth or Google Identity Services-->
            <button type="button" id="google-btn">
              <!-- svg from svgrepo.com -->
              <img src="/assets/svg/google-color-svgrepo-com.svg" alt="google-logo" width="21" height="21">
              Continue with Google
            </button>
          </div>

          <hr>

          <div class="bio">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="enter your email to log in" required>
          </div> 
          
          <div class="bio">
            <label for="password">Password</label>
            <div class="toggle-eye">
              <input type="password" id="password" name="password" placeholder="enter your password" required>
              <button type="button" id="toggle-password">
                <img src="/assets/svg/eye-svgrepo-com.svg" alt="toggle-password" width="21" height="21">
              </button>
            </div>
          </div>
          
          <div id="forgot-password">
            <!-- Remember me -->
            <input type="checkbox" id="rememnber-me" name="remember-me">
            <label for="remember-me">Remember Me</label>

            <!-- work on a way to let users reset their password in case they forget -->
            <!-- figure out how to use the css combinators to target only this -->
            <p class="fp"><a href="" target="_blank" class="login">Forgot password?</a></p>
          </div>

          <button type="submit" class="submit-button">Log In</button>

          <p class="redirect-to-signup">Don't have an account? <a href="signup.html" class="login">Sign Up</a></p>

        </form>
      </div>
    </main>
  </body>
</html>
