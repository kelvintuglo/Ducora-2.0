<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a web app that is created to help teachers track their students performance">

    <link rel="stylesheet" href="/css/signup.css">

    <title>Sign Up-Ducora</title>
  </head>

  <body>
    <main>
      <div class="form-wrapper">
        <header class="main-header">
          <nav class="navbar">
            <ul class="navlinks">
              <li><a class="login" href="signup.html">Sign Up</a></li>
              <li><a class="login" href="login.html">Log In</a></li>
            </ul>
          </nav>
        </header>

        <form id="signup-form" method="POST" action="/ducora-signup">
          <div class="bio">
            <label for="full-name">Full Name:</label>
            <input type="text" id="full-name" name="full-name" placeholder="enter your full name" required>
          </div>

          <div class="bio"> 
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="ducora@gmail.com" required>
          </div>

          <div class="bio">
            <label for="password">Create password:</label>
            <input type="password" id="password" name="password" placeholder="create password" required>
          </div>

          <div class="bio">
            <label for="confirm-password">Confirm password:</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="confirm-password" required>
          </div>

          <p class="terms">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">
              I agree to Ducora's <a class="login" href="">Terms and Condition</a> and <a class="login" href="">Privacy Policy</a>
            </label>
          </p>

          <button type="submit">Sign Up</button>
        </form>

        
      </div>
    </main>

    <footer>
      <p><small>Copyright 2026</small></p>
    </footer>
    
  </body>
</html>
