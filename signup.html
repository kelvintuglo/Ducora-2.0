<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a web app that is created to help teachers track their students performance">

    <link rel="stylesheet" href="/css/signup.css">

    <title>Sign Up-Ducora</title>
  </head>

  <body>
    <main>
      <div class="form-wrapper">
        <header id="main-header">
          <h1>Sign Up to Ducora</h1>
        </header>

        <form id="signup-form" method="POST" action="/ducora-signup">
          <div class="google">
            <!-- TODO: Trigger Google OAuth flow here using Firebase Auth or Google Identity Services-->
            <button type="button" id="google-btn">
              <!-- svg from svgrepo.com -->
              <img src="/assets/svg/google-color-svgrepo-com.svg" alt="google-logo" width="21" height="21">
              Continue with Google
            </button>
          </div>

          <hr>

          <div class="NAMES">
            <!-- TODO: Get these two fields to stack up vertically on top
             of each other in the media query -->
            <div class="bio names">
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" name="first-name" placeholder="enter your first name" required>
            </div>

            <div class="bio names">
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" name="last-name" placeholder="enter your last name" required>
            </div>
          </div>

          <div class="bio"> 
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="ducora@gmail.com" required>
          </div>

          <div class="bio">
            <label for="password">Create password:</label>
            <div class="toggle-eye">
              <input type="password" id="password" name="password" placeholder="create password" required>
              <button type="button" id="toggle-password">
                <img src="/assets/svg/eye-svgrepo-com.svg" alt="toggle-password" width="21" height="21">
              </button>
            </div>
          </div>

          <p class="terms">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">
              I agree to Ducora's <a class="login" href="">Terms and Conditions</a>
            </label>
          </p>

          <button type="submit" class="submit-button">Sign Up</button>

          <p>Already have an account? <a class="login" href="login.html">Log In</a></p>
        </form>

        
      </div>
    </main>
  </body>
</html>
