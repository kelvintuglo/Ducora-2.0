<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a web app that is created to help teachers track their students performance">

    <link rel="stylesheet" href="/css/signup.css">

    <title>Sign Up-Ducora</title>
  </head>

  <body>
    <main>
      <header>
        <nav>
          <ul>
            <li><a href="signup.html">Sign Up</a></li>
            <li><a href="login.html">Log In</a></li>
          </ul>
        </nav>
      </header>

      <form method="POST" action="/ducora-signup">
        <div class="bio">
          <!-- use css to make the label a block element so that the input would be on its own line -->
          <label for="full-name">Full Name:</label>
          <input type="text" id="full-name" name="full-name" placeholder="enter your full name" required>
        </div>

        <div class="bio"> 
          <!-- use css to make the label a block element so that the input would be on its own line -->
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="ducora@gmail.com" required>
        </div>

        <div class="bio">
          <!-- use css to make the label a block element so that the input would be on its own line -->
          <label for="password">Create password:</label>
          <input type="password" id="password" name="password" placeholder="create password" required>
        </div>

        <div class="bio">
          <!-- use css to make the label a block element so that the input would be on its own line -->
          <label for="confirm-password">Confirm password:</label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="confirm-password" required>
        </div>

        <!--<div class="terms">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">
            I agree to Ducora's <a href="">Terms and Condition</a> and <a href="">Privacy Policy</a>
          </label>
        </div>-->

        <p>
          <!-- 
          input[type="checkbox"] + label {
            display: inline;
          } //use this to fix the line problem in css when the text drops below the checkbox input
          -->
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">
            I agree to Ducora's <a href="">Terms and Condition</a> and <a href="">Privacy Policy</a>
          </label>
        </p>

        <button type="submit">Sign Up</button>
      </form>
    </main>

    <footer>
      <!-- add copyright html entity -->
      <p><small>Copyright 2026</small></p>
    </footer>
  </body>
</html>
