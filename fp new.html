<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/fp new.css">

    <title>New Password</title>
  </head>

  <body>
    <!-- 
      1. check to see if password matches the password parameters.
      2. log in straight to the dashboard with a notification that it was successful
      3. If it doesn't match pop up a message notifying the user
    -->
    <main class="container">
      <form id="create-new-password" method="POST" action="/ducora/password">
        <div class="set-new-password">
          <label for="new-password">New Password: </label>
          <input type="password" id="new-password" name="new-password" placeholder="enter new password" required>

          <label for="confirm-password">Confirm Password: </label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="confirm password" required>
        </div>

        <button type="submit" class="new-auth-btn">Submit</button>
      </form>
    </main>
  </body>
</html>
