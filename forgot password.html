<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/forgot password.css">

    <title>Forgot Password</title>
  </head>

  <body>
    <!-- 1. Pop up on the current login screen
     2. enter email used for verification
     3. verification code sent to that email address
     4. authenticate verification code in the background
     5. set new password
     6. automatic login
    -->

    <!-- 
      1. auth the email address, if correct;
      2. send a 6-digit verification code through the backend and then navigate 
      to the next page;
      3. if email doesn't match send a pop up telling the user that the email
      can't be found and don't go to the next page
    -->

    <main class="container">
      <form id="forgot-password-form" method="POST" action="/ducora/forgot-password">
        <div class="enter-email">
          <label for="email">Email: </label>
          <input type="text" id="email" name="email" placeholder="enter your email" required>
        </div>

        <button type="submit" class="enter-email-btn"><a href="/fp verification.html">Submit</a></button>
      </form>
    </main>
  </body>
</html>
